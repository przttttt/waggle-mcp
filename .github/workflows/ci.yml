name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Run ruff check
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest]
        include:
          # Run one Windows smoke-test to catch encoding/path issues early
          - python-version: "3.11"
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project + dev dependencies
        run: pip install -e ".[dev]"

      - name: Verify critical dependencies
        run: |
          pip list
          python -c "import networkx; print('networkx OK')"
          python -c "import pytest; print('pytest OK')"
          python -c "import waggle; print('waggle OK')"

      # Use deterministic embeddings so tests never require a 420 MB download
      - name: Run tests (deterministic mode, no ML)
        env:
          WAGGLE_MODEL: deterministic
          PYTHONUTF8: "1"   # prevents UnicodeEncodeError on Windows
        run: pytest -v --tb=long

  # ── Packaging smoke-test ───────────────────────────────────────────────────
  package:
    name: Package smoke-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Check distribution metadata
        run: |
          pip install twine
          twine check dist/*
