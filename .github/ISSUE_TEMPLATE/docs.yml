name: Documentation improvement
description: Report missing, confusing, or outdated documentation.
title: "[docs] "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Before you submit:
        - install Waggle from PyPI: https://pypi.org/project/waggle-mcp/
        - install the VS Code extension: https://marketplace.visualstudio.com/items?itemName=Abhigyan-Shekhar.waggle-memory
        - attach a screenshot of the confusing, missing, or outdated docs state

        Issues without a screenshot will not be considered.
  - type: textarea
    id: gap
    attributes:
      label: Documentation gap
      description: What is missing or unclear?
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Relevant page or file
      placeholder: README.md, docs/install/codex.md, CONTRIBUTING.md
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
      description: What should the docs say or show instead?
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Attach or paste a screenshot that shows the docs problem. Issues without a screenshot will not be considered.
      placeholder: Paste the screenshot link or drag the screenshot into the issue body.
    validations:
      required: true
